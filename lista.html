<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body{
    margin:0;
    padding:0;
    background:transparent;
    color:#000;
    font-family: Arial, sans-serif;
    line-height:1.35;
  }

  .month{
    margin-bottom:18px;
  }

  .month-title{
    margin:0;
    font-weight:normal;
  }

  .event{
    margin:0;
  }

  a{
    color:#000;
    text-decoration:underline;
  }
</style>
</head>

<body>

<div id="app"></div>

<script>
const url = "https://raw.githubusercontent.com/wczucior-jpg/wydarzenia/main/events.json";

/* mapowanie miesięcy */
const monthMap = {
  "05": "MAJ 2026",
  "06": "CZERWIEC 2026",
  "07": "LIPIEC 2026",
  "09": "WRZESIEŃ 2026"
};

fetch(url)
  .then(r => r.json())
  .then(data => {

    const grouped = {};

    data.forEach(ev => {
      const match = ev.date.match(/\.(\d{2})\./);
      const monthKey = match ? match[1] : null;

      const monthName = monthMap[monthKey] || "INNE";

      if (!grouped[monthName]) grouped[monthName] = [];
      grouped[monthName].push(ev);
    });

    const app = document.getElementById("app");

    Object.keys(grouped).forEach(month => {

      const wrap = document.createElement("div");
      wrap.className = "month";

      const title = document.createElement("div");
      title.className = "month-title";
      title.textContent = "▽ " + month + " ▷ ▷ ▷ ▷";
      wrap.appendChild(title);

      grouped[month].forEach(ev => {

        const div = document.createElement("div");
        div.className = "event";

        let line = ev.date + " – ";

        if (ev.link && ev.link.trim() !== "") {
          line += `<a href="${ev.link}" target="_blank">${ev.artists}</a>`;
        } else {
          line += ev.artists;
        }

        if (ev.venue) line += " – " + ev.venue;
        if (ev.city) line += " – " + ev.city;

        div.innerHTML = line;
        wrap.appendChild(div);
      });

      app.appendChild(wrap);
    });
  });
</script>

</body>
</html>
